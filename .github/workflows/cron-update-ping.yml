name: Cron Update Pinger

# Plano Hobby da Vercel so permite cron diario. Esse workflow do GitHub Actions
# (gratuito) pinga /api/cron-update a cada 10min, garantindo:
#   1. Correcoes de codigo/dado se propagam em <=10min sem forcar nada manualmente.
#   2. Pushes de eventos de jogo (inicio, resultado, horario, atraso) sao detectados
#      dentro do mesmo intervalo — antes ficavam presos no cron diario (ate 24h).
#
# Pode ser disparado manualmente em "Actions" -> "Cron Update Pinger" -> "Run workflow".

on:
  schedule:
    - cron: "*/10 * * * *"   # a cada 10min — janela curta o suficiente pra eventos
                              # de jogo, sem estourar limite de invocacao do Hobby
                              # (~4320 chamadas/mes, dentro da cota grosso modo).
  workflow_dispatch:         # botao manual no GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Pra schedule, evita rodar concorrentemente caso uma execucao demore mais que
    # o intervalo — descarta a nova em vez de empilhar.
    concurrency:
      group: cron-update-ping
      cancel-in-progress: false
    steps:
      - name: Ping /api/cron-update
        run: |
          echo "Pinging cron-update at $(date -u +%FT%TZ)"
          curl -fsS --max-time 120 -A "GHA-cron-pinger/1.0" \
            "https://fonsecanews.com.br/api/cron-update" \
            -o /tmp/cron-resp.json -w "HTTP %{http_code} in %{time_total}s\n"
          echo "--- Response preview ---"
          head -c 500 /tmp/cron-resp.json
          echo
