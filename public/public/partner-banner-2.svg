<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 150" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <clipPath id="bookClip">
      <rect x="40" y="15" width="80" height="120" rx="4"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="150" fill="url(#bg)"/>
  
  <!-- Subtle pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
  </g>
  
  <!-- Glow effects -->
  <circle cx="80" cy="75" r="90" fill="#3b82f6" opacity="0.07"/>
  <circle cx="800" cy="75" r="70" fill="#8b5cf6" opacity="0.05"/>
  
  <!-- Book cover from Amazon -->
  <g clip-path="url(#bookClip)">
    <image href="https://m.media-amazon.com/images/I/71+VkGA5JyL._SY425_.jpg" x="40" y="15" width="80" height="120" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <!-- Book border -->
  <rect x="40" y="15" width="80" height="120" rx="4" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <!-- Book shadow -->
  <rect x="38" y="17" width="80" height="120" rx="4" fill="none" stroke="#000" stroke-width="1" opacity="0.2"/>
  
  <!-- Title -->
  <text x="145" y="48" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">Meus Robôs</text>
  
  <!-- Subtitle -->
  <text x="145" y="72" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Novas relações entre humanos, robôs e IAs</text>
  
  <!-- Author -->
  <text x="145" y="95" font-family="Arial, sans-serif" font-size="11" fill="#64748b">por <tspan fill="#3b82f6" font-weight="bold">Ben-Hur Correia</tspan>  ·  TV Globo  ·  Pesquisador em IA</text>

  <!-- Badge -->
  <g transform="translate(145, 108)">
    <rect x="0" y="0" width="90" height="18" rx="9" fill="#3b82f6" opacity="0.15"/>
    <text x="45" y="13" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle" font-weight="bold">📖 Parceiro FN</text>
  </g>

  <!-- CTA button -->
  <g transform="translate(690, 48)">
    <rect x="0" y="0" width="170" height="44" rx="10" fill="url(#accent)"/>
    <text x="85" y="27" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">Comprar na Amazon →</text>
  </g>
  
  <!-- Amazon text -->
  <text x="775" y="115" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Disponível na Amazon.com.br</text>
</svg>
